{% extends 'base.html' %}

{% block content %}
<div class="container py-4">
    <div class="card shadow-sm">
        <div class="card-body">
            <h2 class="mb-3">Importar Archivos</h2>

            <!-- Mensajes informativos -->
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="alert alert-info">
                        {% for message in messages %}
                            <div>{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <!-- Formulario de carga -->
            <form method="post" enctype="multipart/form-data" id="upload-form">
                <div class="mb-3">
                    <label class="form-label">Selecciona el tipo de archivo:</label>
                    <select class="form-select" name="file_type" id="file_type" required>
                        <option value="">-- Selecciona Tipo --</option>
                        <option value="deforestation">Deforestación anual</option>
                        <option value="administrative_risk">Riesgo administrativo anual</option>
                        <option value="veredas">Polígonos de veredas</option>
                        <option value="adm2">Polígonos de municipios (ADM2)</option>
                        <option value="adm1">Polígonos de departamentos (ADM1)</option>
                        <option value="upra">Fronteras agronómicas UPRA</option>
                        <option value="protected_areas">Áreas protegidas PNN</option>
                    </select>
                </div>

                <!-- Campos adicionales solo si se elige deforestación -->
                <div id="extra-fields" style="display: none;">
                    <div class="mb-3">
                        <label class="form-label">Fuente:</label>
                        <select class="form-select" name="source" id="source">
                            <option value="">-- Selecciona Fuente --</option>
                            <option value="smbyc">SMByC</option>
                            <option value="gfw">Global Forest Watch</option>
                        </select>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Año inicio:</label>
                            <select class="form-select" name="year_start" id="year_start">
                                {% for y in range(2010, current_year + 1) %}
                                    <option value="{{ y }}">{{ y }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Año fin:</label>
                            <select class="form-select" name="year_end" id="year_end">
                                {% for y in range(2010, current_year + 1) %}
                                    <option value="{{ y }}">{{ y }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Carga de archivo -->
                <div class="mb-3">
                    <label class="form-label">Selecciona el archivo:</label>
                    <input class="form-control" type="file" name="file" required>
                </div>

                <button class="btn btn-primary w-100">Subir Archivo</button>
            </form>
        </div>
    </div>
</div>

<!-- Script para control de campos condicionales y validaciones -->
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const tipoSelect = document.getElementById("file_type");
        const extraFields = document.getElementById("extra-fields");
        const form = document.getElementById("upload-form");

        // Mostrar campos extra solo si el tipo es deforestación
        tipoSelect.addEventListener("change", function () {
            extraFields.style.display = this.value === "deforestation" ? "block" : "none";
        });

        // Validaciones antes de enviar el formulario
        form.addEventListener("submit", function (e) {
            if (tipoSelect.value === "deforestation") {
                const yearStart = parseInt(document.getElementById("year_start").value);
                const yearEnd = parseInt(document.getElementById("year_end").value);
                const source = document.getElementById("source").value;

                if (!source) {
                    alert("Debes seleccionar una fuente.");
                    e.preventDefault();
                    return;
                }

                if (isNaN(yearStart) || isNaN(yearEnd)) {
                    alert("Debes seleccionar ambos años.");
                    e.preventDefault();
                    return;
                }

                if (yearEnd <= yearStart) {
                    alert("El año fin debe ser mayor que el año inicio.");
                    e.preventDefault();
                }
            }
        });
    });
</script>
{% endblock %}
