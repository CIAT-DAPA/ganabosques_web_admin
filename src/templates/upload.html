{% extends 'base.html' %}

{% block content %}
<div class="container py-4">
    <div class="card shadow-sm">
        <div class="card-body">
            <h2 class="mb-3">Manejo de datos espaciales</h2>
            <form method="post" enctype="multipart/form-data" id="upload-form">
                <div class="mb-3">
                    <label class="form-label">Selecciona el tipo de archivo:</label>
                    <select class="form-select" name="file_type" id="file_type" required>
                        <option value="">-- Selecciona Tipo --</option>
                        <option value="deforestation">Deforestación anual</option>
                        <option value="veredas">Polígonos de veredas (ADM3)</option>
                        <option value="adm2">Polígonos de municipios (ADM2)</option>
                        <option value="adm1">Polígonos de departamentos (ADM1)</option>
                        <option value="upra">Fronteras agronómicas UPRA</option>
                        <option value="protected_areas">Áreas protegidas PNN</option>
                        <option value="levels_adm">Códigos niveles administrativos</option>
                    </select>
                </div>

                <!-- Campos adicionales para deforestación -->
                <div id="extra-fields" style="display: none;">
                    <div class="mb-3">
                        <label class="form-label">Fuente:</label>
                        <select class="form-select" name="source" id="source">
                            <option value="">-- Selecciona Fuente --</option>
                            {% for value, label in sources %}
                                <option value="{{ value }}">{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Año inicio:</label>
                            <select class="form-select" name="year_start" id="year_start">
                                {% for y in range(2010, current_year + 1) %}
                                    <option value="{{ y }}">{{ y }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Año fin:</label>
                            <select class="form-select" name="year_end" id="year_end">
                                {% for y in range(2010, current_year + 1) %}
                                    <option value="{{ y }}">{{ y }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Campos adicionales para levels_adm -->
                <div id="extra-fields_admlevels" style="display: none;">
                    <div class="mb-3">
                        <label class="form-label">Nivel administrativo a importar:</label>
                        <select class="form-select" name="level" id="level">
                            <option value="todo">Todo</option>
                            <option value="departamento">Departamentos</option>
                            <option value="municipio">Municipios</option>
                            <option value="vereda">Veredas</option>
                        </select>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Selecciona el archivo:</label>
                    <input class="form-control" type="file" name="file" required>
                </div>

                <button class="btn btn-primary w-100">Subir Archivo</button>
            </form>
        </div>
    </div>
</div>

<div id="loader" style="display: none;">
  <div class="spinner"></div>
  <p>Importando datos, por favor espera...</p>
</div>

<style>
  #loader {
    position: fixed;
    z-index: 10000;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(255, 255, 255, 0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .spinner {
    border: 6px solid #f3f3f3;
    border-top: 6px solid #3498db;
    border-radius: 50%;
    width: 60px;
    height: 60px;
    animation: spin 1s linear infinite;
    margin-bottom: 10px;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
</style>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const tipoSelect = document.getElementById("file_type");
        const extraFields = document.getElementById("extra-fields");
        const extraFieldsadm = document.getElementById("extra-fields_admlevels");
        const form = document.getElementById("upload-form");
        const loader = document.getElementById("loader");

        tipoSelect.addEventListener("change", function () {
            extraFields.style.display = this.value === "deforestation" ? "block" : "none";
            extraFieldsadm.style.display = this.value === "levels_adm" ? "block" : "none";
        });

        form.addEventListener("submit", function (e) {
            loader.style.display = "flex";
            if (tipoSelect.value === "deforestation") {
                const yearStart = parseInt(document.getElementById("year_start").value);
                const yearEnd = parseInt(document.getElementById("year_end").value);
                const source = document.getElementById("source").value;

                if (!source) {
                    alert("Debes seleccionar una fuente.");
                    loader.style.display = "none";
                    e.preventDefault();
                    return;
                }

                if (isNaN(yearStart) || isNaN(yearEnd)) {
                    alert("Debes seleccionar ambos años.");
                    loader.style.display = "none";
                    e.preventDefault();
                    return;
                }

                if (yearEnd <= yearStart) {
                    alert("El año fin debe ser mayor que el año inicio.");
                    loader.style.display = "none";
                    e.preventDefault();
                }
            }
        });
    });
</script>
{% endblock %}
