<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Web Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-select@1.13.18/dist/css/bootstrap-select.min.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            display: flex;
            min-height: 100vh;
            margin: 0;
            flex-direction: row;
        }

        .sidebar {
            background-color: #343a40;
            width: 220px;
            transition: width 0.3s ease;
        }

        .sidebar.collapsed {
            width: 60px;
        }

        .sidebar .nav-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            width: 100%;
            transition: padding 0.3s ease;
            color: #fff;
        }

        .nav-link :hover {
            color: #c7c7c7;
        }

        .sidebar .nav-link.active {
            background-color: #495057;
            border-radius: 0;
        }

        .sidebar .nav-link span {
            display: inline-block;
            overflow: hidden;
            white-space: nowrap;
            width: auto;
            max-width: 200px;
            opacity: 1;
            visibility: visible;
            transition: 
                max-width 0.3s ease,
                opacity 0.3s ease,
                visibility 0.3s ease;
        }

        .sidebar.collapsed .nav-link span {
            max-width: 0;
            opacity: 0;
            visibility: hidden;
            width: 60px;
        }

        .content {
            flex-grow: 1;
            padding: 20px;
        }

        .toggle-btn {
            background-color: #343a40;
            color: #fff;
            border: none;
            width: 100%;
            text-align: left;
            padding: 10px 16px;
        }

        .toggle-btn:hover {
            background-color: #495057;
        }

        @media (max-width: 767.98px) {
            body {
                flex-direction: column;
            }

            .sidebar {
                display: none !important;
            }

            .content {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="d-md-none p-2">
        <button class="btn btn-outline-secondary" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar">☰ Menú</button>
    </div>

    <nav id="sidebar" class="sidebar d-none d-md-block">
        <button id="toggleSidebar" class="toggle-btn">☰</button>
        <nav class="nav flex-column">
            <a class="nav-link {% if active_page == 'home' %}active{% endif %}" href="{{ url_for('home.home') }}">
                🏠 <span>Home</span>
            </a>
            <a class="nav-link {% if active_page == 'importar' %}active{% endif %}" href="{{ url_for('upload_file') }}">
                📥 <span>Importar Archivos</span>
            </a>
            <a class="nav-link {% if active_page == 'import_suppliers' %}active{% endif %}" href="{{ url_for('importar_proveedores') }}">
                🧾 <span>Importar Proveedores</span>
            </a>
            <a class="nav-link" href="#">
                🔧 <span>Gestión Usuarios</span>
            </a>
            <a class="nav-link" href="#">
                🗺️ <span>Mapas y Capas</span>
            </a>
            <a class="nav-link" href="#">
                📊 <span>Reportes</span>
            </a>
        </nav>
    </nav>

    <div class="offcanvas offcanvas-start" tabindex="-1" id="mobileSidebar">
        <div class="offcanvas-header bg-dark text-white">
            <h5 class="offcanvas-title">Menú</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body bg-dark">
            <nav class="nav flex-column">
                <a class="nav-link text-white {% if active_page == 'home' %}active{% endif %}" href="{{ url_for('home.home') }}">🏠 Home</a>
                <a class="nav-link text-white {% if active_page == 'importar' %}active{% endif %}" href="{{ url_for('upload_file') }}">📥 Importar Archivos</a>
                <a class="nav-link text-white {% if active_page == 'import_suppliers' %}active{% endif %}" href="{{ url_for('importar_proveedores') }}">🧾 Importar Proveedores</a>
                <a class="nav-link text-white" href="#">🔧 Gestión Usuarios</a>
                <a class="nav-link text-white" href="#">🗺️ Mapas y Capas</a>
                <a class="nav-link text-white" href="#">📊 Reportes</a>
            </nav>
        </div>
    </div>

    <div class="content">
        {% block content %}{% endblock %}
    </div>

    <!-- JS dependencies (in correct order) -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap-select@1.13.18/dist/js/bootstrap-select.min.js"></script>

    <script>
        const toggleBtn = document.getElementById('toggleSidebar');
        const sidebar = document.getElementById('sidebar');
        toggleBtn?.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
        });

        document.addEventListener('DOMContentLoaded', function () {
            if (window.jQuery && $.fn.selectpicker) {
                $('.selectpicker').selectpicker();
            } else {
                console.error('No se pudo inicializar selectpicker. Verifica jQuery y bootstrap-select.');
            }
        });
    </script>
    <script>
        $(function () {
            $('.selectpicker').selectpicker();
        });
    </script>

</body>
</html>
