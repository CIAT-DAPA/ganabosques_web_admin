<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Web Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-select@1.13.18/dist/css/bootstrap-select.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      display: flex;
      min-height: 100vh;
      margin: 0;
      flex-direction: row;
    }

    .sidebar {
      background-color: #343a40;
      width: 220px;
      transition: width 0.3s ease;
    }

    .sidebar.collapsed {
      width: 60px;
    }

    .sidebar .nav-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      color: #fff;
    }

    .nav-link:hover {
      color: #c7c7c7;
    }

    .sidebar .nav-link.active {
      background-color: #495057;
    }

    .sidebar .nav-link span {
      display: inline-block;
      overflow: hidden;
      white-space: nowrap;
      width: auto;
      max-width: 200px;
      opacity: 1;
      visibility: visible;
      transition: max-width 0.3s ease, opacity 0.3s ease, visibility 0.3s ease;
    }

    .sidebar.collapsed .nav-link span {
      max-width: 0;
      opacity: 0;
      visibility: hidden;
    }

    .sidebar .submenu {
      padding-left: 2rem;
      transition: height 0.3s ease, opacity 0.3s ease;
    }

    .sidebar.collapsed .submenu {
      display: none !important;
    }

    .content {
      flex-grow: 1;
      padding: 20px;
    }

    .toggle-btn {
      background-color: #343a40;
      color: #fff;
      border: none;
      width: 100%;
      text-align: left;
      padding: 10px 16px;
    }

    .toggle-btn:hover {
      background-color: #495057;
    }

    @media (max-width: 767.98px) {
      body {
        flex-direction: column;
      }

      .sidebar {
        display: none !important;
      }

      .content {
        padding: 1rem;
      }
    }
  </style>
</head>
<body>

<!-- Botón menú móvil -->
<div class="d-md-none p-2">
  <button class="btn btn-outline-secondary" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar">☰ Menú</button>
</div>

<!-- Sidebar desktop -->
<nav id="sidebar" class="sidebar d-none d-md-block">
  <button id="toggleSidebar" class="toggle-btn">☰</button>
  <nav class="nav flex-column">
    <a class="nav-link {% if active_page == 'home' %}active{% endif %}" href="{{ url_for('home.home') }}">
      <i class="fa-solid fa-house"></i><span>Inicio</span>
    </a>
    <a class="nav-link {% if active_page == 'importar' %}active{% endif %}" href="{{ url_for('spatial.upload_file') }}">
      <i class="fa-solid fa-download"></i><span>Datos espaciales</span>
    </a>
    <a class="nav-link {% if active_page == 'import_suppliers' %}active{% endif %}" href="{{ url_for('suppliers.importar_proveedores') }}">
      <i class="fa-solid fa-truck-fast"></i><span>Importar Proveedores</span>
    </a>

    <!-- Divipola -->
    <div class="nav-item">
      <a class="nav-link {% if active_page in ['adm1', 'adm2', 'adm3'] %}active{% endif %}" data-bs-toggle="collapse" href="#divipolaSubmenu" role="button" aria-expanded="true" aria-controls="divipolaSubmenu">
        <i class="fa-solid fa-map"></i><span>Divipola</span>
      </a>
      <div class="submenu collapse {% if active_page in ['adm1', 'adm2', 'adm3'] %}show{% endif %}" id="divipolaSubmenu">
        <a class="nav-link {% if active_page == 'adm1' %}active{% endif %}" href="{{ url_for('adm1.list_adm1') }}">
          <span style="margin-left: 20px;">Departamentos</span>
        </a>
        <a class="nav-link {% if active_page == 'adm2' %}active{% endif %}" href="{{ url_for('adm2.list_adm2') }}">
          <span style="margin-left: 20px;">Municipios</span>
        </a>
        <a class="nav-link {% if active_page == 'adm3' %}active{% endif %}" href="{{ url_for('adm3.list_adm3') }}">
          <span style="margin-left: 20px;">Veredas</span>
        </a>
      </div>
    </div>

    <a class="nav-link" href="#"><i class="fa-solid fa-user-gear"></i><span>Gestión Usuarios</span></a>
  </nav>
</nav>

<!-- Sidebar móvil -->
<div class="offcanvas offcanvas-start" tabindex="-1" id="mobileSidebar">
  <div class="offcanvas-header bg-dark text-white">
    <h5 class="offcanvas-title">Menú</h5>
    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
  </div>
  <div class="offcanvas-body bg-dark">
    <nav class="nav flex-column">
      <a class="nav-link text-white {% if active_page == 'home' %}active{% endif %}" href="{{ url_for('home.home') }}"><i class="fa-solid fa-house"></i> Inicio</a>
      <a class="nav-link text-white {% if active_page == 'importar' %}active{% endif %}" href="{{ url_for('spatial.upload_file') }}"><i class="fa-solid fa-download"></i> Datos espaciales</a>
      <a class="nav-link text-white {% if active_page == 'import_suppliers' %}active{% endif %}" href="{{ url_for('suppliers.importar_proveedores') }}"><i class="fa-solid fa-truck-fast"></i> Importar Proveedores</a>
      <a class="nav-link text-white" data-bs-toggle="collapse" href="#divipolaSubmenuMobile" role="button" aria-expanded="false" aria-controls="divipolaSubmenuMobile"><i class="fa-solid fa-map"></i> Divipola</a>
      <div class="collapse" id="divipolaSubmenuMobile">
        <a class="nav-link text-white ps-4 {% if active_page == 'adm1' %}active{% endif %}" href="{{ url_for('adm1.list_adm1') }}">Departamentos</a>
        <a class="nav-link text-white ps-4 {% if active_page == 'adm2' %}active{% endif %}" href="{{ url_for('adm2.list_adm2') }}">Municipios</a>
        <a class="nav-link text-white ps-4 {% if active_page == 'adm3' %}active{% endif %}" href="{{ url_for('adm3.list_adm3') }}">Veredas</a>
      </div>
      <a class="nav-link text-white" href="#"><i class="fa-solid fa-user-gear"></i> Gestión Usuarios</a>
    </nav>
  </div>
</div>

<!-- Contenido principal -->
<div class="content">
  {% block content %}{% endblock %}
</div>

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap-select@1.13.18/dist/js/bootstrap-select.min.js"></script>

<script>
  const toggleBtn = document.getElementById('toggleSidebar');
  const sidebar = document.getElementById('sidebar');

  toggleBtn?.addEventListener('click', () => {
    sidebar.classList.toggle('collapsed');
    localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('collapsed'));
  });

  document.addEventListener('DOMContentLoaded', () => {
    if (localStorage.getItem('sidebarCollapsed') === 'true') {
      sidebar.classList.add('collapsed');
    }

    if (window.jQuery && $.fn.selectpicker) {
      $('.selectpicker').selectpicker();
    }
  });
</script>
</body>
</html>
